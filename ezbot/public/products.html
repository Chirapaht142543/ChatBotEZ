<!DOCTYPE html>
<html lang="th">
<head>
<link rel="icon" href="favicon.png" type="image/png" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EZ BOT — จัดการสินค้าและราคา</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/products.css">
<link rel="stylesheet" href="css/broadcast.css"> <!-- Reuses button/toast styles -->
</head>
<body>
  <!-- Sidebar -->
  <div data-include="components/sidebar.html"></div>

  <!-- Main Wrapper -->
  <div class="main-wrapper">
    <!-- Top Header -->
    <div data-include="components/top-header.html"></div>

    <!-- Products Content -->
    <main class="products-container">
      <div class="products-header">
        <div>
          <h1 class="products-title">จัดการสินค้าและราคา</h1>
          <p class="products-subtitle">เพิ่ม แก้ไข ลบ รายชื่อเกม แพ็กเกจ และประเภทออเดอร์สำหรับแชทบอทตอบกลับลูกค้า</p>
        </div>
        <button class="btn-primary-gradient" id="btnAddProduct">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          เพิ่มสินค้าใหม่
        </button>
      </div>

      <!-- Controls -->
      <div class="control-row">
        <div class="search-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาตามชื่อเกม หรือตัวย่อ/คำใกล้เคียง...">
        </div>
      </div>

      <!-- Products Grid -->
      <section class="products-grid" id="productsGrid">
        <!-- Rendered by products.js -->
      </section>
    </main>
  </div>

  <!-- Modal Dialog -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">เพิ่มสินค้าและราคาใหม่</h3>
        <button class="modal-close-btn" id="modalClose">&times;</button>
      </div>
      <form id="productForm">
        <div class="modal-body" style="max-height: 70vh; overflow-y: auto; padding: 24px;">
          <div class="form-group" style="margin-bottom: 16px;">
            <label for="inputName">ชื่อเกม (เช่น Genshin Impact)</label>
            <input type="text" id="inputName" class="form-control" placeholder="ระบุชื่อเกมภาษาอังกฤษหรือไทย..." required>
          </div>
          
          <div class="form-group" style="margin-bottom: 16px;">
            <label for="inputAliases">คำค้นหา/ตัวย่อใกล้เคียง (คั่นด้วยจุลภาค เช่น genshin, เกนชิน)</label>
            <input type="text" id="inputAliases" class="form-control" placeholder="ช่วยให้บอทค้นหาเจอเมื่อลูกค้าพิมพ์ผิดหรือเรียกชื่ออื่น...">
          </div>

          <div class="form-group" style="margin-bottom: 16px;">
            <label for="selectOrderType">ประเภทออเดอร์ในการเติมเกม</label>
            <select id="selectOrderType" class="form-control" required style="width:100%; height:40px; border: 1px solid var(--border-color); border-radius: 8px; padding: 0 12px; font-family: inherit;">
              <option value="instant">เข้าทันที (Instant Auto-Topup)</option>
              <option value="pre_order">พรีออเดอร์ (แอดมินดำเนินการแมนนวล)</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom: 16px;">
            <label>รูปภาพตารางราคา (Game Pricing Table Image)</label>
            <div class="image-upload-container" style="display: flex; gap: 16px; align-items: center; margin-top: 8px;">
              <div class="image-preview-box" id="imagePreviewBox" style="width: 100px; height: 100px; border-radius: 8px; border: 1px solid var(--border-color); background: #f8fafc; display: grid; place-items: center; overflow: hidden; position: relative;">
                <span id="previewPlaceholder" style="font-size: 24px; color: var(--text-muted);">📷</span>
                <img id="previewImage" src="" style="display: none; width: 100%; height: 100%; object-fit: cover;" />
              </div>
              <div style="flex: 1;">
                <button type="button" class="btn-outline" id="btnUploadImage" style="padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;">อัปโหลดรูปภาพ</button>
                <button type="button" class="btn-outline" id="btnDeleteImage" style="padding: 8px 16px; font-size: 13px; margin-left: 8px; display: none; color: #ef4444; border-color: #fca5a5; font-weight: 600; cursor: pointer;">ลบรูปภาพ</button>
                <input type="file" id="productImageInput" accept="image/*" style="display: none;">
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 6px;">ไฟล์ภาพ JPG, PNG ขนาดที่แนะนำ 800x600px</p>
              </div>
            </div>
          </div>

          <!-- Packages section -->
          <div>
            <div class="modal-packages-header">
              <span class="modal-packages-title">แพ็กเกจเติมเงินและราคา</span>
              <button type="button" class="btn-add-pkg" id="btnAddPkgRow">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                เพิ่มแพ็กเกจ
              </button>
            </div>
            <div id="packagesInputContainer">
              <!-- Dynamically populated package input rows -->
            </div>
          </div>
        </div>
        <div class="form-actions" style="margin: 0; padding: 16px 24px; background: #f8fafc; border-top: 1px solid var(--border-color);">
          <button type="button" class="btn-outline" id="btnCancel" style="flex: 1;">ยกเลิก</button>
          <button type="submit" class="btn-primary-gradient" style="flex: 1.5; justify-content: center;">บันทึกสินค้า</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
