<section class="chat-list-col">
        <div class="chat-list-header">
          <div class="chat-list-title-row" style="display: flex; align-items: center;">
            <h2 class="chat-list-title" style="margin-right: 8px;">แชททั้งหมด</h2>
            <span class="chat-list-badge" id="convCount">0</span>
            <div style="flex:1"></div>
            <button onclick="if(confirm('ล้างข้อมูลแชททั้งหมดจริงๆ หรือไม่?')) { fetch(API+'/api/clear-all',{method:'POST'}).then(()=>window.location.reload()) }" title="ล้างแชททั้งหมด" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; padding:4px; transition:color 0.2s; display:flex; align-items:center;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--text-muted)'">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
          </div>
          <div class="search-wrapper">
            <span class="search-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input class="search-input" id="search" placeholder="ค้นหาแชทหรือชื่อผู้ติดต่อ" />
          </div>
          <div style="margin-top: 8px; display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px;" id="sourceFiltersContainer">
            <button class="source-filter-btn active" data-source="all" title="ทั้งหมด">ทั้งหมด</button>
            <button class="source-filter-btn" data-source="Web Chat" title="Website"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button>
            <button class="source-filter-btn" data-source="Facebook" title="Facebook"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg></button>
            <button class="source-filter-btn" data-source="Instagram" title="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></button>
            <button class="source-filter-btn" data-source="LINE Official" title="LINE"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M24 10.3c0-5.7-5.4-10.3-12-10.3S0 4.6 0 10.3c0 5.1 4.3 9.4 10.1 10.1l-.7 2.5c-.1.3 0 .6.2.8.1.1.3.2.5.2h.3l2.8-1.6c5.7-.7 10.8-5 10.8-12zM8.1 13.9H5.7c-.4 0-.7-.3-.7-.7V7.1c0-.4.3-.7.7-.7s.7.3.7.7v5.4h1.7c.4 0 .7.3.7.7s-.3.7-.7.7zm4.1-.7c0 .4-.3.7-.7.7s-.7-.3-.7-.7V7.1c0-.4.3-.7.7-.7s.7.3.7.7v6.1zm5.7 0c0 .4-.3.7-.7.7h-2.4c-.4 0-.7-.3-.7-.7V7.1c0-.4.3-.7.7-.7h2.4c.4 0 .7.3.7.7s-.3.7-.7.7H15v1.9h1.7c.4 0 .7.3.7.7s-.3.7-.7.7H15V12h2.2c.4 0 .7.3.7.7zm4.8-2.6c0 .4-.3.7-.7.7H21v1.9c0 .4-.3.7-.7.7s-.7-.3-.7-.7V7.1c0-.4.3-.7.7-.7h2.1c.4 0 .7.3.7.7s-.3.7-.7.7H21V10h1.8c.4 0 .7.3.7.7z"/></svg></button>
          </div>
          <style>
            .source-filter-btn {
              background: var(--bg-input, #f8fafc);
              border: 1px solid var(--border-color, #e2e8f0);
              color: var(--text-muted, #64748b);
              border-radius: 8px;
              padding: 6px 12px;
              font-size: 12px;
              cursor: pointer;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 4px;
              transition: all 0.2s;
              white-space: nowrap;
            }
            .source-filter-btn:hover {
              background: var(--bg-hover, #f1f5f9);
              color: var(--text-primary, #1e293b);
            }
            .source-filter-btn.active {
              background: var(--brand-blue, #2563eb);
              color: white;
              border-color: var(--brand-blue, #2563eb);
            }
            .source-filter-btn.active[data-source="Facebook"] svg, 
            .source-filter-btn.active[data-source="LINE Official"] svg {
               fill: white;
            }
            .source-filter-btn.active[data-source="Instagram"] svg,
            .source-filter-btn.active[data-source="Web Chat"] svg {
               stroke: white;
            }
          </style>
        </div>
        
        <div class="chat-tabs">
          <div class="chat-tab active" data-tab="all">ทั้งหมด</div>
          <div class="chat-tab" data-tab="waiting">รอการตอบ</div>
          <div class="chat-tab" data-tab="responding">กำลังตอบ</div>
          <div class="chat-tab" data-tab="closed">ปิดแล้ว</div>
        </div>
        
        <div class="conversations-list" id="convs">
          <!-- Populated by JavaScript -->
        </div>

        <div class="load-more-container">
          <button class="load-more-btn">โหลดแชทเพิ่มเติม</button>
        </div>
      </section>
