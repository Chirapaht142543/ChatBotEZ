<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EZ BOT — จัดการเทมเพลตข้อความ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/templates.css">
<link rel="stylesheet" href="css/broadcast.css"> <!-- Reuses button/toast styles -->
</head>
<body>
  <!-- Sidebar -->
  <div data-include="components/sidebar.html"></div>

  <!-- Main Wrapper -->
  <div class="main-wrapper">
    <!-- Top Header -->
    <div data-include="components/top-header.html"></div>

    <!-- Templates Content -->
    <main class="templates-container">
      <div class="templates-header">
        <div>
          <h1 class="templates-title">เทมเพลตข้อความตอบกลับ</h1>
          <p class="templates-subtitle">ตั้งค่าข้อความที่ใช้งานบ่อย เพื่ออำนวยความสะดวกในการพิมพ์ตอบแชทของแอดมิน</p>
        </div>
        <button class="btn-primary-gradient" id="btnAddTemplate">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          เพิ่มเทมเพลตข้อความ
        </button>
      </div>

      <!-- Controls -->
      <div class="control-row">
        <div class="search-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาเทมเพลตตามชื่อหรือข้อความ...">
        </div>
      </div>

      <!-- Templates Grid -->
      <section class="templates-grid" id="templatesGrid">
        <!-- Rendered by templates.js -->
      </section>
    </main>
  </div>

  <!-- Modal Dialog -->
  <div class="modal-overlay" id="templateModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">เพิ่มเทมเพลตข้อความใหม่</h3>
        <button class="modal-close-btn" id="modalClose">&times;</button>
      </div>
      <form id="templateForm">
        <div class="modal-body">
          <div class="form-group">
            <label for="inputTitle">ชื่อเทมเพลต (สั้นๆ สำหรับเลือกใช้)</label>
            <input type="text" id="inputTitle" class="form-control" placeholder="เช่น ทักทายลูกค้า, แจ้งเลขบิล" required>
          </div>
          <div class="form-group" style="margin-bottom: 8px;">
            <label for="inputText">ข้อความตอบกลับ</label>
            <textarea id="inputText" class="form-control" placeholder="พิมพ์ข้อความตอบกลับที่นี่..." required style="min-height: 140px;"></textarea>
            <div class="char-counter" id="charCounter">0 ตัวอักษร</div>
          </div>
        </div>
        <div class="form-actions" style="margin: 0; padding: 16px 24px; background: #f8fafc; border-top: 1px solid var(--border-color);">
          <button type="button" class="btn-outline" id="btnCancel" style="flex: 1;">ยกเลิก</button>
          <button type="submit" class="btn-primary-gradient" style="flex: 1.5; justify-content: center;">บันทึกเทมเพลต</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/templates.js"></script>
</body>
</html>
