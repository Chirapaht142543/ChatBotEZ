<!DOCTYPE html>
<html lang="th">
<head>
<link rel="icon" href="favicon.png" type="image/png" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EZ BOT — แดชบอร์ดแอดมิน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <!-- Sidebar -->
  <div data-include="components/sidebar.html"></div>

  <!-- Main Wrapper -->
  <div class="main-wrapper">
    <!-- Top Header -->
    <div data-include="components/top-header.html"></div>

    <!-- Column Workspace -->
    <div class="columns-container">
      
      <!-- Column 1: Chat List -->
      <div data-include="components/chat-list.html"></div>

      <!-- Column 2: Chat Window -->
      <section class="chat-window-col" id="chat">
        <div class="empty-state">เลือกแชทจากรายการด้านซ้ายเพื่อเริ่มตอบ</div>
      </section>

      <!-- Column 3: Customer Info -->
      <div data-include="components/customer-info.html"></div>
      
    </div>
  </div>

  <!-- History Modal -->
  <div class="modal-overlay" id="historyModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>ประวัติการแชทของลูกค้า</h2>
        <button class="btn-close-modal" onclick="closeHistoryModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="historyList"></div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
