<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตัวอย่างการฝัง Widget บนเว็บไซต์</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: #0d0d0d; color: #f0e6d2; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1a1510, #2a2015); padding: 20px 32px; border-bottom: 1px solid #2a2520; display: flex; align-items: center; gap: 16px; }
  .header img { height: 40px; }
  .header h1 { font-size: 20px; color: #d4a017; font-weight: 700; }
  .content { padding: 40px 32px; max-width: 800px; }
  .content h2 { font-size: 24px; margin-bottom: 12px; color: #d4a017; }
  .content p { color: #8a7e6b; line-height: 1.7; margin-bottom: 16px; }
  .card { background: #1a1a1a; border: 1px solid #2a2520; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card h3 { color: #f0e6d2; margin-bottom: 8px; }
  .badge { display: inline-block; background: #d4a01733; color: #d4a017; font-size: 12px; padding: 3px 10px; border-radius: 8px; font-weight: 600; }
</style>
</head>
<body>
  <div class="header">
    <h1>🎮 EZ TERMGAME — ตัวอย่างหน้าเว็บ</h1>
  </div>
  <div class="content">
    <h2>ทดสอบ Chat Widget</h2>
    <p>หน้านี้จำลองเว็บไซต์จริง เพื่อดูว่าปุ่มแชทบอทแสดงผลอย่างไรเมื่อฝังลงบนเว็บ ดูมุมขวาล่างของหน้าจอครับ 👇</p>
    <div class="card">
      <h3>🔥 สินค้าแนะนำ</h3>
      <p>Valorant Points <span class="badge">เติมทันที</span></p>
    </div>
    <div class="card">
      <h3>⚡ Flash Sale</h3>
      <p>PUBG Mobile UC ลด 10% <span class="badge">จำกัดจำนวน</span></p>
    </div>
    <div class="card">
      <h3>🎯 ROV</h3>
      <p>เติมคูปอง Garena Shell <span class="badge">พร้อมส่ง</span></p>
    </div>
  </div>

  <!-- HappyBot Chat Widget — แค่บรรทัดเดียว! -->
  <script src="http://localhost:3001/widget.js" data-color="#d4a017" data-position="bottom-right" data-greeting="สวัสดีค่ะ สนใจเติมเกมอะไรไหมคะ? 🎮"></script>
</body>
</html>
