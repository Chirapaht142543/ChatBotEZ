<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>แชทกับร้าน — HappyBot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
  :root{
    --brand:#d4a017; --brand-dark:#c4941a; --brand-glow:rgba(212,160,23,0.25);
    --bg:#0d0d0d; --bg-card:#1a1a1a; --bg-input:#141414;
    --bubble-bot:#1e1e1e; --bubble-cust:#d4a017;
    --text:#f0e6d2; --text-muted:#8a7e6b; --border:#2a2520;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Sarabun',-apple-system,"Segoe UI",sans-serif}
  body{background:transparent;margin:0;padding:0;overflow:hidden;height:100vh}
  .widget{width:100%;height:100vh;background:var(--bg-card);border-radius:0;
    display:flex;flex-direction:column;overflow:hidden;position:relative}
  .head{background:linear-gradient(135deg,#1a1510 0%,#2a2015 50%,#1a1510 100%);color:var(--text);padding:18px 20px;display:flex;align-items:center;gap:12px;
    border-bottom:1px solid var(--border);position:relative;overflow:hidden}
  .head::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
    background:linear-gradient(135deg,rgba(212,160,23,0.06) 0%,transparent 60%);pointer-events:none}
  .head .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#b8860b);
    display:grid;place-items:center;font-size:22px;box-shadow:0 4px 12px var(--brand-glow);flex-shrink:0}
  .head-info { flex:1; }
  .head h1{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
  .head-topic-badge { background:var(--brand); color:#000; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:600; display:none; }
  .head .status{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:5px}
  .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;
    box-shadow:0 0 6px rgba(74,222,128,0.4);animation:dotPulse 2s ease-in-out infinite}
  @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.5}}
  
  .end-chat-btn { background:transparent; border:1px solid var(--border); color:var(--text-muted); padding:6px 10px; border-radius:12px; font-size:12px; cursor:pointer; transition:all 0.2s; z-index:10; }
  .end-chat-btn:hover { background:rgba(255,0,0,0.1); color:#ef4444; border-color:#ef4444; }
  
  .msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;
    background:var(--bg);scrollbar-width:thin;scrollbar-color:#2a2520 transparent}
  .msgs::-webkit-scrollbar{width:5px}
  .msgs::-webkit-scrollbar-track{background:transparent}
  .msgs::-webkit-scrollbar-thumb{background:#2a2520;border-radius:3px}
  .row{display:flex;max-width:82%}
  .row.cust{align-self:flex-end;justify-content:flex-end}
  .row.bot{align-self:flex-start}
  .bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
  .row.bot .bubble{background:var(--bubble-bot);color:var(--text);border-bottom-left-radius:4px;
    border:1px solid var(--border)}
  .row.cust .bubble{background:linear-gradient(135deg,var(--brand),#b8860b);color:#0d0d0d;
    border-bottom-right-radius:4px;font-weight:500;box-shadow:0 2px 8px var(--brand-glow)}
  .time{font-size:10px;color:var(--text-muted);margin-top:3px}
  .row.cust .time{text-align:right}
  .typing{align-self:flex-start;color:var(--brand);font-size:13px;padding:4px 8px;display:none;
    animation:typingFade 1s ease-in-out infinite alternate}
  @keyframes typingFade{from{opacity:.5}to{opacity:1}}
  .compose{border-top:1px solid var(--border);padding:12px;display:flex;gap:8px;background:var(--bg-card)}
  .compose input{flex:1;border:1px solid var(--border);border-radius:24px;padding:11px 16px;font-size:14px;
    outline:none;background:var(--bg-input);color:var(--text);transition:border-color .2s}
  .compose input::placeholder{color:var(--text-muted)}
  .compose input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}
  .compose button{background:linear-gradient(135deg,var(--brand),#b8860b);color:#0d0d0d;border:none;
    width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;transition:all .2s;font-weight:700;
    box-shadow:0 4px 12px var(--brand-glow)}
  .compose button:hover{transform:scale(1.05);box-shadow:0 6px 18px var(--brand-glow)}
  .compose.disabled { display: none; }
  
  .msg-image{
    max-width: 100%;
    max-height: 180px;
    border-radius: 12px;
    display: block;
    cursor: pointer;
    transition: opacity .15s ease-in-out, transform .15s ease-in-out;
  }
  .msg-image:hover{
    opacity: 0.9;
    transform: scale(1.01);
  }
  #attach-btn{
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #attach-btn:hover{
    color: var(--brand);
    border-color: var(--brand);
    box-shadow: 0 0 8px var(--brand-glow);
    transform: scale(1.05);
  }
  
  /* Overlays */
  .overlay-screen {
    position: absolute;
    top: 60px; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 50;
    display: none;
    flex-direction: column;
    padding: 24px;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .overlay-screen.active { display: flex; }
  .overlay-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .overlay-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
  
  .topic-btn {
    width: 100%; max-width: 280px;
    padding: 14px; margin-bottom: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .topic-btn:hover { background: var(--bubble-bot); border-color: var(--brand); color: var(--brand); }
  
  .rating-stars { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-direction: row-reverse; }
  .rating-stars input { display: none; }
  .rating-stars label { font-size: 36px; color: var(--border); cursor: pointer; transition: color 0.2s; }
  .rating-stars label:hover,
  .rating-stars label:hover ~ label,
  .rating-stars input:checked ~ label { color: var(--brand); }
  
  .rating-comment {
    width: 100%; max-width: 280px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    color: var(--text);
    font-size: 14px;
    resize: none;
    margin-bottom: 16px;
    outline: none;
  }
  .rating-comment:focus { border-color: var(--brand); }
  
  .primary-btn {
    width: 100%; max-width: 280px;
    padding: 14px;
    background: linear-gradient(135deg, var(--brand), #b8860b);
    border: none;
    color: #000;
    border-radius: 12px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .primary-btn:hover { transform: scale(1.02); box-shadow: 0 4px 15px var(--brand-glow); }
  .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Lightbox styling */
  #lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 99999;
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
    opacity: 0;
    transition: opacity 0.2s ease-in-out;
  }
  #lightbox.show {
    display: flex;
    opacity: 1;
  }
  #lightbox-img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    transform: scale(0.95);
    transition: transform 0.2s ease-in-out;
  }
  #lightbox.show #lightbox-img {
    transform: scale(1);
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="head">
      <div class="avatar">🎮</div>
      <div class="head-info">
        <h1>EZ TERMGAME <span class="head-topic-badge" id="head-topic"></span></h1>
        <div class="status" id="head-status"><span class="dot"></span> พร้อมตอบ • ตอบกลับอัตโนมัติ</div>
      </div>
      <button class="end-chat-btn" id="end-chat-btn" style="display:none;">จบสนทนา</button>
    </div>
    
    <div class="msgs" id="msgs"></div>
    <div class="typing" id="typing">กำลังพิมพ์...</div>
    
    <div class="compose" id="compose-area">
      <input type="file" id="file-input" accept="image/*" style="display:none;" />
      <button id="attach-btn" title="ส่งรูปภาพ">📷</button>
      <input id="input" placeholder="พิมพ์ข้อความ..." autocomplete="off" />
      <button id="send">➤</button>
    </div>
    
    <!-- Topic Overlay -->
    <div class="overlay-screen" id="overlay-topic">
      <div style="font-size:48px; margin-bottom:16px;">👋</div>
      <div class="overlay-title">สวัสดีค่ะ! มีเรื่องไหนให้เราช่วยไหมคะ?</div>
      <div class="overlay-desc">โปรดเลือกหัวข้อเพื่อเริ่มการสนทนา</div>
      <button class="topic-btn" data-topic="ปัญหาออเดอร์/เติมเกม">⚠️ ปัญหาออเดอร์ / เติมเกม</button>
      <button class="topic-btn" data-topic="สอบถามสินค้า/ราคา">🛒 สอบถามสินค้า / ราคา</button>
      <button class="topic-btn" data-topic="แจ้งโอนเงิน">💳 แจ้งโอนเงิน</button>
      <button class="topic-btn" data-topic="อื่นๆ">💬 เรื่องอื่นๆ</button>
    </div>
    
    <!-- Rating Overlay -->
    <div class="overlay-screen" id="overlay-rating">
      <div style="font-size:48px; margin-bottom:16px;">🌟</div>
      <div class="overlay-title">การสนทนาจบลงแล้ว</div>
      <div class="overlay-desc" id="rating-desc">รบกวนให้คะแนนความพึงพอใจ เพื่อปรับปรุงบริการค่ะ</div>
      
      <div class="rating-stars" id="rating-stars">
        <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
        <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
        <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
        <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
        <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
      </div>
      <textarea class="rating-comment" id="rating-comment" rows="3" placeholder="ข้อเสนอแนะเพิ่มเติม (ไม่บังคับ)"></textarea>
      
      <button class="primary-btn" id="submit-rating-btn">ส่งผลประเมิน</button>
      <button class="primary-btn" id="new-chat-btn" style="display:none; margin-top:16px;">เริ่มการสนทนาใหม่</button>
    </div>
    
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox">
    <img id="lightbox-img" src="" alt="พรีวิวรูปภาพ" />
  </div>

<script>
const API = location.origin;
const msgsEl = document.getElementById('msgs');
const inputEl = document.getElementById('input');
const typingEl = document.getElementById('typing');
const composeArea = document.getElementById('compose-area');
const overlayTopic = document.getElementById('overlay-topic');
const overlayRating = document.getElementById('overlay-rating');
const endChatBtn = document.getElementById('end-chat-btn');
const headTopic = document.getElementById('head-topic');

// คงรหัสบทสนทนาไว้ในเครื่อง
let convId = localStorage.getItem('hb_conv');

// คงรหัสลูกค้าเพื่อเชื่อมโยงประวัติ
let customerId = localStorage.getItem('hb_customer_id');
if (!customerId) {
  customerId = 'cust_' + Math.random().toString(36).slice(2, 10);
  localStorage.setItem('hb_customer_id', customerId);
}

// ดึงชื่อโปรไฟล์ลูกค้าจาก URL
const urlParams = new URLSearchParams(window.location.search);
let customerName = urlParams.get('customerName') || urlParams.get('name') || 'ลูกค้าเว็บไซต์';
let customerEmail = urlParams.get('email') || '';
let customerPhone = urlParams.get('phone') || '';
let customerAvatar = urlParams.get('avatar') || urlParams.get('avatarUrl') || '';
let eventSource = null;

let initDone = false;
let pendingSends = [];

function fmt(ts){ return new Date(ts).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}); }

function render(m){
  const mine = m.sender === 'customer';
  const row = document.createElement('div');
  row.className = 'row ' + (mine ? 'cust' : 'bot');
  
  let bubbleContent = '';
  if (m.kind === 'image') {
    const fallbackText = m.text && !m.text.includes('.') ? m.text : '';
    const capHtml = fallbackText ? `<div style="margin-top: 4px;">${escapeHtml(fallbackText)}</div>` : '';
    bubbleContent = `<img src="${m.mediaUrl}" class="msg-image" alt="สลิปหรือรูปภาพ" />${capHtml}`;
  } else {
    bubbleContent = escapeHtml(m.text || '');
  }
  
  row.innerHTML = `<div><div class="bubble">${bubbleContent}</div><div class="time">${fmt(m.createdAt)}</div></div>`;
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function escapeHtml(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function showTopicScreen() {
  overlayTopic.classList.add('active');
  overlayRating.classList.remove('active');
  composeArea.classList.add('disabled');
  endChatBtn.style.display = 'none';
  headTopic.style.display = 'none';
  msgsEl.innerHTML = '';
}

function showRatingScreen(alreadyRated = false) {
  overlayTopic.classList.remove('active');
  overlayRating.classList.add('active');
  composeArea.classList.add('disabled');
  endChatBtn.style.display = 'none';
  
  if(alreadyRated) {
    document.getElementById('rating-stars').style.display = 'none';
    document.getElementById('rating-comment').style.display = 'none';
    document.getElementById('submit-rating-btn').style.display = 'none';
    document.getElementById('new-chat-btn').style.display = 'block';
    document.getElementById('rating-desc').textContent = 'ขอบคุณสำหรับความคิดเห็นค่ะ!';
  } else {
    document.getElementById('rating-stars').style.display = 'flex';
    document.getElementById('rating-comment').style.display = 'block';
    document.getElementById('submit-rating-btn').style.display = 'block';
    document.getElementById('new-chat-btn').style.display = 'none';
    document.getElementById('rating-desc').textContent = 'รบกวนให้คะแนนความพึงพอใจ เพื่อปรับปรุงบริการค่ะ';
    
    // reset form
    document.querySelectorAll('input[name="rating"]').forEach(el => el.checked = false);
    document.getElementById('rating-comment').value = '';
  }
}

function enterChatMode(topic) {
  overlayTopic.classList.remove('active');
  overlayRating.classList.remove('active');
  composeArea.classList.remove('disabled');
  endChatBtn.style.display = 'block';
  if (topic) {
    headTopic.textContent = topic;
    headTopic.style.display = 'inline-block';
  }
}

async function createOrLoadConv(topic = null){
  if(!convId) {
    convId = 'web_' + Math.random().toString(36).slice(2,10); 
    localStorage.setItem('hb_conv', convId);
  }
  
  const res = await fetch(API+'/api/conversations',{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({
      conversationId:convId, 
      customerId: customerId,
      customerName:customerName,
      email:customerEmail,
      phone:customerPhone,
      avatarUrl:customerAvatar,
      topic: topic
    })});
  const conv = await res.json();
  
  if(conv.status === 'closed') {
    showRatingScreen(!!conv.rating);
    return;
  }
  
  enterChatMode(conv.topic);

  // โหลดประวัติ
  const hist = await (await fetch(API+`/api/conversations/${convId}/messages`)).json();
  msgsEl.innerHTML = '';
  if(hist.length===0){
    render({sender:'bot',text:'สวัสดีค่ะ 😊 ยินดีให้บริการนะคะ สอบถามเรื่องไหนได้เลยค่ะ',createdAt:Date.now()});
    if (topic) {
      await sendText(`เรื่องที่ต้องการติดต่อ: ${topic}`);
    }
  } else hist.forEach(render);
  
  // เปิดสตรีมเรียลไทม์
  if(eventSource) eventSource.close();
  eventSource = new EventSource(API+`/api/stream?conversationId=${convId}`);
  
  let esConnected = false;
  eventSource.addEventListener('open', () => {
    if (esConnected) {
      window.location.reload(); // รีโหลดเมื่อเซิร์ฟเวอร์เพิ่งรีสตาร์ทใหม่
    }
    esConnected = true;
  });
  
  eventSource.addEventListener('clear_all', () => {
    localStorage.removeItem('hb_conv');
    window.location.reload();
  });

  eventSource.addEventListener('message', e=>{
    typingEl.style.display='none';
    const m = JSON.parse(e.data);
    if(m.sender!=='customer') render(m); // ข้อความเราเอง render ไปแล้วตอนส่ง
  });
  
  eventSource.addEventListener('status_changed', e => {
    console.log("Received status_changed event:", e.data);
    try {
      const data = JSON.parse(e.data);
      if (data.status === 'closed') {
        setTimeout(() => showRatingScreen(false), 500); // ดีเลย์เล็กน้อยเพื่อให้ข้อความแอดมินแสดงก่อน
      }
    } catch(err) {
      console.error(err);
    }
  });

  // แชทพร้อมแล้ว
  initDone = true;
  const queued = pendingSends.slice();
  pendingSends = [];
  for (const t of queued) { await sendText(t); }
}

async function sendText(rawText){
  const text = (rawText || '').trim();
  if(!text) return;
  render({sender:'customer',text,createdAt:Date.now()});
  typingEl.style.display='block';
  await fetch(API+'/api/messages',{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({
      conversationId:convId,
      sender:'customer',
      text,
      customerName: customerName,
      email: customerEmail,
      phone: customerPhone,
      avatarUrl: customerAvatar
    })});
}

async function send(){
  const text = inputEl.value.trim();
  if(!text) return;
  inputEl.value='';
  await sendText(text);
}

// Topic Buttons
document.querySelectorAll('.topic-btn').forEach(btn => {
  btn.onclick = () => {
    const topic = btn.getAttribute('data-topic');
    createOrLoadConv(topic);
  };
});

// End Chat Button
endChatBtn.onclick = async () => {
  if(!confirm('คุณต้องการจบการสนทนานี้ใช่หรือไม่?')) return;
  await fetch(API+`/api/conversations/${convId}/close`, { method: 'POST' });
  showRatingScreen(false);
};

// Rating Submit
document.getElementById('submit-rating-btn').onclick = async () => {
  const selected = document.querySelector('input[name="rating"]:checked');
  if(!selected) {
    alert('กรุณาเลือกคะแนนดาวก่อนส่งค่ะ');
    return;
  }
  const score = parseInt(selected.value, 10);
  const comment = document.getElementById('rating-comment').value.trim();
  
  const btn = document.getElementById('submit-rating-btn');
  btn.disabled = true;
  btn.textContent = 'กำลังส่ง...';
  
  await fetch(API+`/api/conversations/${convId}/rating`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ score, comment })
  });
  
  btn.disabled = false;
  btn.textContent = 'ส่งผลประเมิน';
  showRatingScreen(true);
};

// New Chat Button
document.getElementById('new-chat-btn').onclick = () => {
  localStorage.removeItem('hb_conv');
  convId = null;
  initDone = false;
  if(eventSource) { eventSource.close(); eventSource = null; }
  showTopicScreen();
};

window.addEventListener('message', async (e) => {
  if (e.data && e.data.type === 'hb-send' && e.data.text) {
    if (initDone) { await sendText(e.data.text); }
    else { pendingSends.push(e.data.text); }
    return;
  }
  if (e.data && e.data.type === 'setProfile') {
    const { name, email, phone, avatarUrl } = e.data;
    if (name) customerName = name;
    if (email) customerEmail = email;
    if (phone) customerPhone = phone;
    if (avatarUrl) customerAvatar = avatarUrl;
    
    if (convId && initDone) {
      await fetch(API+'/api/conversations',{
        method:'POST',
        headers:{'content-type':'application/json'},
        body:JSON.stringify({
          conversationId: convId,
          customerName: name || customerName,
          email: email || '',
          phone: phone || '',
          avatarUrl: avatarUrl || ''
        })
      });
    }
  }
});

document.getElementById('send').onclick = send;
inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });

// Image Upload
const fileInput = document.getElementById('file-input');
const attachBtn = document.getElementById('attach-btn');
attachBtn.onclick = () => fileInput.click();
fileInput.onchange = async () => {
  const file = fileInput.files[0];
  if (!file) return;
  fileInput.value = '';
  if (!file.type.startsWith('image/')) {
    alert('กรุณาเลือกไฟล์รูปภาพเท่านั้นค่ะ');
    return;
  }
  typingEl.style.display = 'block';
  typingEl.textContent = 'กำลังอัปโหลดรูปภาพ...';
  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];
    try {
      const res = await fetch(API + '/api/upload', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ filename: file.name, base64 })
      });
      const data = await res.json();
      if (data.success) {
        render({ sender: 'customer', text: file.name, kind: 'image', mediaUrl: data.url, createdAt: Date.now() });
        await fetch(API + '/api/messages', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            conversationId: convId, sender: 'customer', text: file.name, kind: 'image', mediaUrl: data.url,
            customerName, email: customerEmail, phone: customerPhone, avatarUrl: customerAvatar
          })
        });
      } else { alert('อัปโหลดรูปภาพล้มเหลวค่ะ'); }
    } catch (err) { alert('เกิดข้อผิดพลาดในการอัปโหลดรูปภาพ'); } 
    finally { typingEl.style.display = 'none'; typingEl.textContent = 'กำลังพิมพ์...'; }
  };
  reader.readAsDataURL(file);
};

// Lightbox
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
msgsEl.addEventListener('click', e => {
  if (e.target.classList.contains('msg-image')) {
    lightboxImg.src = e.target.src;
    lightbox.style.display = 'flex';
    lightbox.offsetHeight;
    lightbox.classList.add('show');
  }
});
lightbox.onclick = () => {
  lightbox.classList.remove('show');
  setTimeout(() => { if (!lightbox.classList.contains('show')) lightbox.style.display = 'none'; }, 200);
};

// Init logic
if(convId) {
  createOrLoadConv();
} else {
  showTopicScreen();
}
</script>
