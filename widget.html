<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>แชทกับร้าน — EZ BOT</title>
<style>
  :root{
    --brand:#2563eb; --brand-dark:#1d4ed8; --bg:#f1f5f9;
    --bubble-bot:#eef2ff; --bubble-cust:#2563eb; --text:#1e293b; --muted:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,"Segoe UI","Sarabun",sans-serif}
  body{background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
  .widget{width:100%;max-width:400px;height:640px;max-height:90vh;background:#fff;border-radius:20px;
    box-shadow:0 20px 50px rgba(15,23,42,.18);display:flex;flex-direction:column;overflow:hidden}
  .head{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;padding:18px 20px;display:flex;align-items:center;gap:12px}
  .head .avatar{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:22px}
  .head h1{font-size:16px;font-weight:600}
  .head .status{font-size:12px;opacity:.85;display:flex;align-items:center;gap:5px}
  .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block}
  .msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;background:#fafbff}
  .row{display:flex;max-width:82%}
  .row.cust{align-self:flex-end;justify-content:flex-end}
  .row.bot{align-self:flex-start}
  .bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .row.bot .bubble{background:var(--bubble-bot);color:var(--text);border-bottom-left-radius:4px}
  .row.cust .bubble{background:var(--bubble-cust);color:#fff;border-bottom-right-radius:4px}
  .time{font-size:10px;color:var(--muted);margin-top:3px}
  .row.cust .time{text-align:right}
  .typing{align-self:flex-start;color:var(--muted);font-size:13px;padding:4px 8px;display:none}
  .compose{border-top:1px solid #eef0f4;padding:12px;display:flex;gap:8px;background:#fff}
  .compose input{flex:1;border:1px solid #e2e8f0;border-radius:24px;padding:11px 16px;font-size:14px;outline:none}
  .compose input:focus{border-color:var(--brand)}
  .compose button{background:var(--brand);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;transition:.15s}
  .compose button:hover{background:var(--brand-dark)}
  .msg-image{
    max-width: 100%;
    max-height: 180px;
    border-radius: 12px;
    display: block;
    cursor: pointer;
    transition: opacity .15s ease-in-out, transform .15s ease-in-out;
  }
  .msg-image:hover{
    opacity: 0.9;
    transform: scale(1.01);
  }
  #attach-btn{
    background: transparent;
    color: var(--muted);
    border: 1px solid #e2e8f0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #attach-btn:hover{
    color: var(--brand);
    border-color: var(--brand);
    transform: scale(1.05);
  }
  /* Lightbox styling */
  #lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 99999;
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
    opacity: 0;
    transition: opacity 0.2s ease-in-out;
  }
  #lightbox.show {
    display: flex;
    opacity: 1;
  }
  #lightbox-img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    transform: scale(0.95);
    transition: transform 0.2s ease-in-out;
  }
  #lightbox.show #lightbox-img {
    transform: scale(1);
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="head">
      <div class="avatar">🤖</div>
      <div>
        <h1>ร้าน HappyBag</h1>
        <div class="status"><span class="dot"></span> พร้อมตอบ • ตอบกลับอัตโนมัติ</div>
      </div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="typing" id="typing">กำลังพิมพ์...</div>
    <div class="compose">
      <input type="file" id="file-input" accept="image/*" style="display:none;" />
      <button id="attach-btn" title="ส่งรูปภาพ">📷</button>
      <input id="input" placeholder="พิมพ์ข้อความ..." autocomplete="off" />
      <button id="send">➤</button>
    </div>
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox">
    <img id="lightbox-img" src="" alt="พรีวิวรูปภาพ" />
  </div>

<script>
const pathParts = window.location.pathname.split('/');
const API = location.origin + (pathParts.length > 2 && pathParts[1] === 'ezbot' ? '/' + pathParts[1] : '');
const msgsEl = document.getElementById('msgs');
const inputEl = document.getElementById('input');
const typingEl = document.getElementById('typing');

// คงรหัสบทสนทนาไว้ในเครื่อง เพื่อให้คุยต่อได้เมื่อกลับมา
let convId = localStorage.getItem('hb_conv');
if(!convId){ convId = 'web_' + Math.random().toString(36).slice(2,10); localStorage.setItem('hb_conv', convId); }

function fmt(ts){ return new Date(ts).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}); }

function render(m){
  const mine = m.sender === 'customer';
  const row = document.createElement('div');
  row.className = 'row ' + (mine ? 'cust' : 'bot');
  
  let bubbleContent = '';
  if (m.kind === 'image') {
    const fallbackText = m.text && !m.text.includes('.') ? m.text : '';
    const capHtml = fallbackText ? `<div style="margin-top: 4px;">${escapeHtml(fallbackText)}</div>` : '';
    let imgUrl = m.mediaUrl || '';
    if (imgUrl.startsWith('/uploads/')) {
      imgUrl = API + imgUrl;
    }
    bubbleContent = `<img src="${imgUrl}" class="msg-image" alt="สลิปหรือรูปภาพ" />${capHtml}`;
  } else {
    bubbleContent = escapeHtml(m.text || '');
  }
  
  row.innerHTML = `<div><div class="bubble">${bubbleContent}</div><div class="time">${fmt(m.createdAt)}</div></div>`;
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function escapeHtml(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function init(){
  // สร้าง/เรียกคืนห้องสนทนา
  await fetch(API+'/api/conversations',{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({conversationId:convId, customerName:'ลูกค้าเว็บไซต์'})});
  // โหลดประวัติ
  const msgs = await (await fetch(API+`/api/conversations/${convId}/messages`)).json();
  if(msgs.length===0){
    render({sender:'bot',text:'สวัสดีค่ะ 😊 ยินดีให้บริการนะคะ สอบถามเรื่องไหนได้เลยค่ะ',createdAt:Date.now()});
  } else msgs.forEach(render);
  // เปิดสตรีมเรียลไทม์
  const es = new EventSource(API+`/api/stream?conversationId=${convId}`);
  es.addEventListener('message', e=>{
    typingEl.style.display='none';
    const m = JSON.parse(e.data);
    if(m.sender!=='customer') render(m); // ข้อความเราเอง render ไปแล้วตอนส่ง
  });
}

async function send(){
  const text = inputEl.value.trim();
  if(!text) return;
  inputEl.value='';
  render({sender:'customer',text,createdAt:Date.now()});
  typingEl.style.display='block';
  await fetch(API+'/api/messages',{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({conversationId:convId,sender:'customer',text})});
}

document.getElementById('send').onclick = send;
inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });

// === การส่งรูปภาพ ===
const fileInput = document.getElementById('file-input');
const attachBtn = document.getElementById('attach-btn');

attachBtn.onclick = () => fileInput.click();

fileInput.onchange = async () => {
  const file = fileInput.files[0];
  if (!file) return;
  
  // ล้างค่าอินพุตเพื่อให้เลือกไฟล์เดิมซ้ำได้
  fileInput.value = '';
  
  if (!file.type.startsWith('image/')) {
    alert('กรุณาเลือกไฟล์รูปภาพเท่านั้นค่ะ');
    return;
  }
  
  // แสดงสถานะกำลังอัปโหลด
  typingEl.style.display = 'block';
  typingEl.textContent = 'กำลังอัปโหลดรูปภาพ...';
  
  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];
    try {
      const res = await fetch(API + '/api/upload', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ filename: file.name, base64 })
      });
      const data = await res.json();
      if (data.success) {
        // แสดงในแชทเราทันที
        render({
          sender: 'customer',
          text: file.name,
          kind: 'image',
          mediaUrl: data.url,
          createdAt: Date.now()
        });
        
        // ส่งข้อความรูปภาพไปยังเซิร์ฟเวอร์
        await fetch(API + '/api/messages', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            conversationId: convId,
            sender: 'customer',
            text: file.name,
            kind: 'image',
            mediaUrl: data.url
          })
        });
      } else {
        alert('อัปโหลดรูปภาพล้มเหลวค่ะ');
      }
    } catch (err) {
      console.error('Upload error:', err);
      alert('เกิดข้อผิดพลาดในการอัปโหลดรูปภาพ');
    } finally {
      typingEl.style.display = 'none';
      typingEl.textContent = 'กำลังพิมพ์...';
    }
  };
  reader.readAsDataURL(file);
};

// === ระบบพรีวิวรูปภาพขนาดใหญ่ (Lightbox) ===
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

msgsEl.addEventListener('click', e => {
  if (e.target.classList.contains('msg-image')) {
    lightboxImg.src = e.target.src;
    lightbox.style.display = 'flex';
    lightbox.offsetHeight;
    lightbox.classList.add('show');
  }
});

lightbox.onclick = () => {
  lightbox.classList.remove('show');
  setTimeout(() => {
    if (!lightbox.classList.contains('show')) {
      lightbox.style.display = 'none';
    }
  }, 200);
};

init();
</script>
</body>
</html>
