<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EZ BOT — แดชบอร์ดแอดมิน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sidebar-bg: #101c36;
    --sidebar-active: #1c2642;
    --sidebar-text: #8f9dbd;
    --sidebar-text-hover: #ffffff;
    --brand-blue: #2563eb;
    --brand-blue-hover: #1d4ed8;
    --bg-light: #f8fafc;
    --border-color: #e2e8f0;
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --online-green: #22c55e;
    --unread-badge: #ef4444;
    --bubble-customer: #ffffff;
    --bubble-agent: #e6efff;
    --sticky-note-bg: #fffbeb;
    --sticky-note-border: #fef08a;
    --sticky-note-text: #854d0e;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Sarabun', 'Inter', -apple-system, sans-serif;
  }

  body {
    background-color: var(--bg-light);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ---- Sidebar Layout ---- */
  .sidebar {
    width: 250px;
    background-color: var(--sidebar-bg);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    height: 100%;
    z-index: 10;
  }

  .sidebar-header {
    padding: 24px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .sidebar-logo-container {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background-color: var(--brand-blue);
    display: grid;
    place-items: center;
    color: #ffffff;
    font-size: 20px;
  }

  .sidebar-brand-name {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.5px;
  }

  .sidebar-menu {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    display: flex;
    flex-direction: column;
  }

  .sidebar-menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: var(--sidebar-text);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .sidebar-menu a:hover {
    color: var(--sidebar-text-hover);
    background-color: rgba(255, 255, 255, 0.03);
  }

  .sidebar-menu a.active {
    color: #ffffff;
    background-color: var(--sidebar-active);
    border-left-color: var(--brand-blue);
    font-weight: 600;
  }

  .sidebar-menu a svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
    flex-shrink: 0;
  }

  .sidebar-badge {
    margin-left: auto;
    background-color: var(--unread-badge);
    color: #ffffff;
    font-size: 11px;
    font-weight: 600;
    border-radius: 10px;
    padding: 2px 7px;
    min-width: 20px;
    text-align: center;
  }

  .sidebar-footer {
    padding: 20px;
    font-size: 11px;
    color: #52607e;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }

  /* ---- Main Area Layout ---- */
  .main-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  /* ---- Top Header Bar ---- */
  .top-header {
    height: 60px;
    background-color: #ffffff;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .menu-toggle-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    display: grid;
    place-items: center;
  }

  .menu-toggle-btn svg {
    width: 20px;
    height: 20px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .agent-status-dropdown {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    background-color: #ffffff;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .agent-status-dropdown:hover {
    background-color: #f8fafc;
  }

  .agent-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: var(--online-green);
  }

  .agent-status-arrow {
    border: solid var(--text-secondary);
    border-width: 0 1.5px 1.5px 0;
    display: inline-block;
    padding: 2.5px;
    transform: rotate(45deg);
    margin-bottom: 2px;
  }

  .notification-bell {
    position: relative;
    cursor: pointer;
    color: var(--text-secondary);
    display: grid;
    place-items: center;
  }

  .notification-bell svg {
    width: 20px;
    height: 20px;
  }

  .notification-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background-color: var(--unread-badge);
    color: #ffffff;
    font-size: 9px;
    font-weight: 700;
    border-radius: 50%;
    width: 14px;
    height: 14px;
    display: grid;
    place-items: center;
  }

  .admin-profile {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .admin-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
  }

  .admin-info {
    display: flex;
    flex-direction: column;
  }

  .admin-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .admin-role {
    font-size: 11px;
    color: var(--text-secondary);
  }

  /* ---- Columns Layout ---- */
  .columns-container {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ---- Column 1: Chat List ---- */
  .chat-list-col {
    width: 310px;
    background-color: #ffffff;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .chat-list-header {
    padding: 16px;
    border-bottom: 1px solid var(--border-color);
  }

  .chat-list-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .chat-list-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .chat-list-title-arrow {
    border: solid var(--brand-blue);
    border-width: 0 2px 2px 0;
    display: inline-block;
    padding: 2.5px;
    transform: rotate(45deg);
    margin-bottom: 3px;
  }

  .chat-list-badge {
    background-color: #eff6ff;
    color: var(--brand-blue);
    font-size: 11px;
    font-weight: 700;
    border-radius: 12px;
    padding: 1px 8px;
    margin-left: 4px;
  }

  .search-wrapper {
    position: relative;
    margin-top: 12px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    display: grid;
    place-items: center;
  }

  .search-icon svg {
    width: 14px;
    height: 14px;
  }

  .search-input {
    width: 100%;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 8px 12px 8px 34px;
    font-size: 13px;
    outline: none;
    background-color: #f8fafc;
    color: var(--text-primary);
    transition: border-color 0.2s, background-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--brand-blue);
    background-color: #ffffff;
  }

  .chat-tabs {
    display: flex;
    border-bottom: 1px solid var(--border-color);
    padding: 0 8px;
  }

  .chat-tab {
    flex: 1;
    text-align: center;
    padding: 12px 4px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .chat-tab:hover {
    color: var(--text-primary);
  }

  .chat-tab.active {
    color: var(--brand-blue);
    border-bottom-color: var(--brand-blue);
    font-weight: 600;
  }

  .conversations-list {
    flex: 1;
    overflow-y: auto;
  }

  .conversation-item {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid #f1f5f9;
    cursor: pointer;
    position: relative;
    transition: background-color 0.2s;
  }

  .conversation-item:hover {
    background-color: #f8fafc;
  }

  .conversation-item.active {
    background-color: #f0f5ff;
  }

  .conversation-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background-color: var(--brand-blue);
  }

  .avatar-container {
    position: relative;
    flex-shrink: 0;
  }

  .avatar-img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
  }

  .avatar-online-dot {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background-color: var(--online-green);
    border: 2px solid #ffffff;
  }

  .conversation-meta {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .conv-name-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2px;
  }

  .conv-name {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conv-time {
    font-size: 10.5px;
    color: var(--text-muted);
  }

  .conv-snippet-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .conv-snippet {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    margin-right: 8px;
  }

  .conv-badge {
    background-color: var(--brand-blue);
    color: #ffffff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .load-more-container {
    padding: 12px 16px;
    text-align: center;
    border-top: 1px solid var(--border-color);
  }

  .load-more-btn {
    width: 100%;
    background-color: #f1f5f9;
    border: none;
    border-radius: 8px;
    padding: 8px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--brand-blue);
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .load-more-btn:hover {
    background-color: #e2e8f0;
  }

  /* ---- Column 2: Chat Window ---- */
  .chat-window-col {
    flex: 1;
    background-color: #f4f6fb;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border-color);
    position: relative;
  }

  .chat-window-header {
    height: 60px;
    background-color: #ffffff;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
  }

  .header-user-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-user-text {
    display: flex;
    flex-direction: column;
  }

  .header-user-name {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .header-user-status {
    font-size: 11px;
    color: var(--online-green);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .header-user-status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: var(--online-green);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-action-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border-color);
    border-radius: 50%;
    background-color: #ffffff;
    color: var(--text-secondary);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .header-action-btn:hover {
    background-color: #f8fafc;
    color: var(--text-primary);
  }

  .header-action-btn svg {
    width: 16px;
    height: 16px;
  }

  .header-action-btn.star-active {
    color: #eab308;
    fill: #eab308;
  }

  .chat-messages-stream {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .date-divider {
    display: flex;
    justify-content: center;
    margin: 8px 0;
  }

  .date-divider-pill {
    background-color: #e2e8f0;
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 12px;
    border-radius: 12px;
  }

  .message-bubble-row {
    display: flex;
    width: 100%;
  }

  .message-bubble-row.inbound {
    justify-content: flex-start;
  }

  .message-bubble-row.outbound {
    justify-content: flex-end;
  }

  .message-bubble-container {
    max-width: 65%;
    display: flex;
    flex-direction: column;
  }

  .message-bubble {
    padding: 10px 14px;
    font-size: 13.5px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .inbound .message-bubble {
    background-color: var(--bubble-customer);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    border-radius: 12px 12px 12px 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }

  .outbound .message-bubble {
    background-color: var(--bubble-agent);
    color: var(--text-primary);
    border-radius: 12px 12px 4px 12px;
  }

  .message-image {
    max-width: 100%;
    width: 220px;
    border-radius: 8px;
    display: block;
    margin-bottom: 6px;
  }

  .message-meta-row {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .inbound .message-meta-row {
    margin-left: 4px;
  }

  .outbound .message-meta-row {
    justify-content: flex-end;
    margin-right: 4px;
  }

  .checkmarks-svg {
    width: 14px;
    height: 14px;
    color: var(--brand-blue);
  }

  .chat-compose-area {
    background-color: #ffffff;
    border-top: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .compose-tabs {
    display: flex;
    border-bottom: 1px solid #f1f5f9;
    padding: 0 16px;
  }

  .compose-tab {
    padding: 10px 16px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .compose-tab.active {
    color: var(--brand-blue);
    border-bottom-color: var(--brand-blue);
  }

  .compose-textarea {
    width: 100%;
    height: 64px;
    border: none;
    outline: none;
    padding: 12px 20px;
    font-size: 13.5px;
    color: var(--text-primary);
    resize: none;
  }

  .compose-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px 12px;
  }

  .compose-actions-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .compose-action-btn {
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    display: grid;
    place-items: center;
    padding: 4px;
    border-radius: 4px;
    transition: background-color 0.2s, color 0.2s;
  }

  .compose-action-btn:hover {
    background-color: #f1f5f9;
    color: var(--text-primary);
  }

  .compose-action-btn svg {
    width: 18px;
    height: 18px;
  }

  /* ---- Split Send Button ---- */
  .send-split-btn {
    display: flex;
    align-items: stretch;
    height: 34px;
    background-color: var(--brand-blue);
    border-radius: 6px;
    overflow: hidden;
  }

  .send-main-part {
    background: none;
    border: none;
    color: #ffffff;
    font-size: 13px;
    font-weight: 600;
    padding: 0 14px 0 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .send-main-part:hover {
    background-color: rgba(255,255,255,0.08);
  }

  .send-main-part svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  .send-divider-line {
    width: 1px;
    background-color: rgba(255,255,255,0.2);
    margin: 8px 0;
  }

  .send-dropdown-part {
    background: none;
    border: none;
    color: #ffffff;
    padding: 0 8px;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .send-dropdown-part:hover {
    background-color: rgba(255,255,255,0.08);
  }

  .send-dropdown-part svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
  }

  /* ---- Column 3: Customer Info ---- */
  .customer-info-col {
    width: 290px;
    background-color: #ffffff;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .collapsible-header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border-color);
    cursor: pointer;
  }

  .collapsible-title {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .collapsible-arrow {
    border: solid var(--text-secondary);
    border-width: 0 1.5px 1.5px 0;
    display: inline-block;
    padding: 2.5px;
    transform: rotate(45deg);
    margin-bottom: 2px;
    transition: transform 0.2s;
  }

  .collapsible-arrow.collapsed {
    transform: rotate(-135deg);
  }

  .customer-details-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .info-profile-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 6px;
    padding-bottom: 18px;
    border-bottom: 1px solid #f1f5f9;
  }

  .info-avatar-img {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
  }

  .info-customer-name {
    font-size: 14.5px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .info-customer-status {
    font-size: 11px;
    color: var(--online-green);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .info-field-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .info-field-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .info-field-val {
    font-size: 13px;
    color: var(--text-primary);
  }

  .source-channel {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .source-line-svg {
    width: 14px;
    height: 14px;
    fill: #06c755;
  }

  .info-tag-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .btn-add-tag {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--brand-blue);
    display: grid;
    place-items: center;
  }

  .btn-add-tag svg {
    width: 16px;
    height: 16px;
  }

  .tag-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }

  .tag-pill {
    background-color: #eff6ff;
    color: var(--brand-blue);
    font-size: 11.5px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tag-close {
    cursor: pointer;
    display: grid;
    place-items: center;
    color: var(--text-muted);
  }

  .tag-close:hover {
    color: var(--brand-blue);
  }

  .tag-close svg {
    width: 10px;
    height: 10px;
  }

  .info-note-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .btn-edit-note {

<script>
const API = location.origin;
let convs = {};        // id -> conversation
let activeId = null;
let activeSubTab = 'reply'; // 'reply' or 'notes'

const convsEl = document.getElementById('convs');
const chatEl = document.getElementById('chat');
const infoBody = document.getElementById('infoBody');
const searchInput = document.getElementById('search');

// Time formatter to show exact/relative times
function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  
  const dDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  
  const diffTime = nowDate - dDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  
  if (diffDays === 0) {
    return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
  } else if (diffDays === 1) {
    return 'เมื่อวาน';
  } else if (diffDays === 2) {
    return '2 วันที่แล้ว';
  } else {
    return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
  }
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}

// Render Conversation List
function renderConvList() {
  const items = Object.values(convs).sort((a, b) => (b.lastMessageAt || 0) - (a.lastMessageAt || 0));
  
  // Update badges & counts
  document.getElementById('convCount').textContent = items.length;
  const totalUnread = items.reduce((s, c) => s + (c.unread || 0), 0);
  document.getElementById('sidebarBadge').textContent = totalUnread;

  // Filter based on active tab
  const activeTabEl = document.querySelector('.chat-tab.active');
  const filter = activeTabEl ? activeTabEl.dataset.tab : 'all';
  
  const filtered = items.filter(c => {
    if (filter === 'waiting') return c.status === 'waiting';
    if (filter === 'responding') return c.mode === 'human' && c.status !== 'closed';
    if (filter === 'closed') return c.status === 'closed';
    return true; // 'all'
  });

  const query = searchInput.value.toLowerCase();

  convsEl.innerHTML = filtered.map(c => {
    const isSearchMatch = c.customerName.toLowerCase().includes(query) || (c.lastMessage || '').toLowerCase().includes(query);
    if (!isSearchMatch) return '';
    
    // Set fallback image
    const avatar = c.avatarUrl || `https://eu.ui-avatars.com/api/?name=${encodeURIComponent(c.customerName)}&background=dfe6f5&color=1e293b`;
    const isOnline = c.id === 'conv_ploy' || c.id === 'conv_pan'; // simulated online users in mockup

    return `
      <div class="conversation-item ${c.id === activeId ? 'active' : ''}" data-id="${c.id}">
        <div class="avatar-container">
          <img class="avatar-img" src="${avatar}" alt="${escapeHtml(c.customerName)}" />
          ${isOnline ? `<div class="avatar-online-dot"></div>` : ''}
        </div>
        <div class="conversation-meta">
          <div class="conv-name-row">
            <span class="conv-name">${escapeHtml(c.customerName)}</span>
            <span class="conv-time">${c.lastMessageAt ? formatTime(c.lastMessageAt) : ''}</span>
          </div>
          <div class="conv-snippet-row">
            <span class="conv-snippet">${escapeHtml(c.lastMessage || '')}</span>
            ${c.unread ? `<span class="conv-badge">${c.unread}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');

  convsEl.querySelectorAll('.conversation-item').forEach(el => {
    el.onclick = () => openConv(el.dataset.id);
  });
}

// Open Conversation
async function openConv(id) {
  activeId = id;
  const c = convs[id];
  c.unread = 0; // mark as read
  renderConvList();
  renderInfo(c);

  const msgs = await (await fetch(API + `/api/conversations/${id}/messages`)).json();

          <div class="send-divider-line"></div>
          <button class="send-dropdown-part">
            <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
          </button>
        </div>
      </div>
    </div>`;

  // Render Date separator "วันนี้"
  const streamEl = document.getElementById('stream');
  streamEl.innerHTML = `<div class="date-divider"><span class="date-divider-pill">วันนี้</span></div>`;

  msgs.forEach(addBubble);
  scrollDown();

  // Attach events
  document.getElementById('sendBtn').onclick = handleSend;
  document.getElementById('replyTextarea').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  document.getElementById('tabReply').onclick = () => switchSubTab('reply');
  document.getElementById('tabNotes').onclick = () => switchSubTab('notes');
  document.getElementById('starBtn').onclick = toggleStar;
}

function switchSubTab(tab) {
  activeSubTab = tab;
  const tabReply = document.getElementById('tabReply');
  const tabNotes = document.getElementById('tabNotes');
  const textarea = document.getElementById('replyTextarea');
  
  if (tab === 'reply') {
    tabReply.classList.add('active');
    tabNotes.classList.remove('active');
    textarea.placeholder = 'พิมพ์ข้อความตอบกลับ...';
  } else {
    tabReply.classList.remove('active');
    tabNotes.classList.add('active');
    textarea.placeholder = 'พิมพ์โน้ตส่วนตัวที่นี่...';
  }
}

// Add bubble message to the UI
function addBubble(m) {
  const stream = document.getElementById('stream');
  if (!stream || m.conversationId !== activeId) return;

  const isOutbound = m.sender !== 'customer'; // admin or bot goes right

  const row = document.createElement('div');
  row.className = `message-bubble-row ${isOutbound ? 'outbound' : 'inbound'}`;

  const container = document.createElement('div');
  container.className = 'message-bubble-container';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  if (m.kind === 'image') {
    const img = document.createElement('img');
    img.src = m.mediaUrl || '/backpack.png';
    img.className = 'message-image';
    bubble.appendChild(img);
    
    const cap = document.createElement('div');
    cap.textContent = m.text;
    bubble.appendChild(cap);
  } else {
    bubble.textContent = m.text;
  }

  container.appendChild(bubble);

  // Metadata (time, status)
  const meta = document.createElement('div');
  meta.className = 'message-meta-row';
  
  const timeText = document.createTextNode(formatTime(m.createdAt));
  meta.appendChild(timeText);

  if (isOutbound) {
    // Add blue double checkmark
    const svgStr = `<svg class="checkmarks-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 5L9.5 12.5L6 9M22 5l-7.5 7.5L13 11"/></svg>`;
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgStr, 'image/svg+xml');
    meta.appendChild(doc.documentElement);
  }

  container.appendChild(meta);
  row.appendChild(container);
  stream.appendChild(row);
  scrollDown();
}

function scrollDown() {
  const s = document.getElementById('stream');
  if (s) s.scrollTop = s.scrollHeight;
}

// Toggle Star
async function toggleStar() {
  const c = convs[activeId];
  c.starred = !c.starred;
  const starBtn = document.getElementById('starBtn');
  if (c.starred) {
    starBtn.classList.add('star-active');
  } else {
    starBtn.classList.remove('star-active');
  }
}

// Send Message / Add Note
async function handleSend() {
  const textarea = document.getElementById('replyTextarea');
  const text = textarea.value.trim();
  if (!text) return;
  textarea.value = '';

  if (activeSubTab === 'reply') {
    // Send standard message to customer
    await fetch(API + '/api/messages', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ conversationId: activeId, sender: 'admin', text })
    });
  } else {
    // Add internal note
    const c = convs[activeId];
    if (!c.internalNotes) c.internalNotes = [];
    c.internalNotes.push({
      text,
      date: new Date().toLocaleString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
      sender: 'แอดมิน'
    });
    renderInfo(c); // refresh info panel
  }
}

// Toggle Bot Mode
async function toggleMode() {
  const c = convs[activeId];
  const nextMode = c.mode === 'human' ? 'bot' : 'human';
  
  await fetch(API + `/api/conversations/${activeId}/mode`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ mode: nextMode })
  });

  c.mode = nextMode;
  renderInfo(c);
  renderConvList();
}

// Save notes to contact
function saveContactNote(text) {
  const c = convs[activeId];
  c.notes = text;
  fetch(API + `/api/conversations/${activeId}/mode`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ notes: text }) // backend will save dynamic attributes
  });
}

// Add tag to customer
function addCustomerTag() {
  const tag = prompt("ป้อนชื่อแท็กที่ต้องการเพิ่ม:");
  if (!tag) return;
  const c = convs[activeId];
  if (!c.tags) c.tags = [];
  if (!c.tags.includes(tag)) {
    c.tags.push(tag);
    renderInfo(c);
  }
}

// Remove tag
function removeCustomerTag(tag) {
  const c = convs[activeId];
  if (c.tags) {
    c.tags = c.tags.filter(t => t !== tag);
    renderInfo(c);
  }
}

    <div class="info-field-group">
      <span class="info-field-label">โหมดการตอบ</span>

          ? `<span>🤖 โหมดบอทอัตโนมัติ</span><span style="font-size:10px;opacity:0.8">กดเพื่อเปลี่ยน</span>` 
          : `<span>🧑 โหมดแอดมินดูแล</span><span style="font-size:10px;opacity:0.8">กดเพื่อเปลี่ยน</span>`

      </div>
    </div>

    <!-- Contact Info -->

    </div>

      <span class="info-field-label">อีเมล</span>
      <span class="info-field-val">${escapeHtml(email)}</span>
    </div>
    
    <div class="info-field-group">
      <span class="info-field-label">เข้ามาจาก</span>
      <div class="info-field-val source-channel">
        ${source === 'LINE Official' 
          ? `<svg class="source-line-svg" viewBox="0 0 24 24"><path d="M24 10.3c0-5.7-5.4-10.3-12-10.3S0 4.6 0 10.3c0 5.1 4.3 9.4 10.1 10.1l-.7 2.5c-.1.3 0 .6.2.8.1.1.3.2.5.2h.3l2.8-1.6c5.7-.7 10.8-5 10.8-12zM8.1 13.9H5.7c-.4 0-.7-.3-.7-.7V7.1c0-.4.3-.7.7-.7s.7.3.7.7v5.4h1.7c.4 0 .7.3.7.7s-.3.7-.7.7zm4.1-.7c0 .4-.3.7-.7.7s-.7-.3-.7-.7V7.1c0-.4.3-.7.7-.7s.7.3.7.7v6.1zm5.7 0c0 .4-.3.7-.7.7h-2.4c-.4 0-.7-.3-.7-.7V7.1c0-.4.3-.7.7-.7h2.4c.4 0 .7.3.7.7s-.3.7-.7.7H15v1.9h1.7c.4 0 .7.3.7.7s-.3.7-.7.7H15V12h2.2c.4 0 .7.3.7.7zm4.8-2.6c0 .4-.3.7-.7.7H21v1.9c0 .4-.3.7-.7.7s-.7-.3-.7-.7V7.1c0-.4.3-.7.7-.7h2.1c.4 0 .7.3.7.7s-.3.7-.7.7H21V10h1.8c.4 0 .7.3.7.7z"/></svg> LINE Official`

    <!-- Tags -->
    <div class="info-field-group">

      <div class="tag-container">

                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

}

// Initialize Application
async function init() {
  const list = await (await fetch(API + '/api/conversations')).json();
  list.forEach(c => convs[c.id] = c);
  renderConvList();

  // Auto-open คุณพลอย (conv_ploy) on page load, matching screenshot
  if (convs['conv_ploy']) {
    openConv('conv_ploy');
  }

  // SSE Stream for admins
  const es = new EventSource(API + '/api/admin-stream');
  es.addEventListener('message', e => {
    const m = JSON.parse(e.data);
    const c = convs[m.conversationId];
    if (c) {
      c.lastMessage = m.text;
      c.lastMessageAt = m.createdAt;
      if (m.sender === 'customer' && m.conversationId !== activeId) {
        c.unread = (c.unread || 0) + 1;
      }
    }
    addBubble(m);
    renderConvList();
  });
  
  es.addEventListener('conversation', e => {
    const c = JSON.parse(e.data);
    convs[c.id] = Object.assign(convs[c.id] || {}, c);
    renderConvList();
  });

  es.addEventListener('handoff', e => {
    const { conversationId } = JSON.parse(e.data);
    if (convs[conversationId]) {
      convs[conversationId].mode = 'human';
    }
    renderConvList();
    if (conversationId === activeId) {
      renderInfo(convs[activeId]);
    }
  });
}

// Search filtering event
searchInput.addEventListener('input', () => {
  renderConvList();
});

// Category Tabs event
document.querySelectorAll('.chat-tab').forEach(tab => {
  tab.onclick = (e) => {
    document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    renderConvList();
  };
});

init();
</script>
